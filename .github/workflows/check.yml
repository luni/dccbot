name: Python Code Checks

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Primes
        id: cache-primes
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-cache-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-cache-

      - name: Set up Python environment
        run: |
          wget -qO- https://astral.sh/uv/install.sh | sh
          uv sync

      - name: Run Ruff (PEP 8 Formatting)
        run: |
          uv run make format

      - name: Run Ruff (Linting + Docstrings)
        run: |
          uv run make check

      - name: Run vulture (Duplicate Code)
        run: |
          uv run make vulture

      - name: Run xenon (Cyclomatic Complexity)
        run: |
          uv run make xenon

      - name: Run bandit (Security)
        run: |
          uv run make bandit

      - name: Run pyright (Type Checking)
        run: |
          uv run make pyright

      - name: Run pytest (Unit Tests)
        run: |
          cp config.json.sample config.json
          uv run pytest tests/unit -v --cov --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start InspIRCd and XDCC bot
        run: |
          docker compose up -d ircd xdccbot
          # Wait for IRC server to be ready
          echo "Waiting for IRC server to start..."
          timeout 60 bash -c 'until nc -z localhost 6667; do sleep 1; done'
          echo "IRC server is ready!"
          # Wait for XDCC bot to connect
          echo "Waiting for XDCC bot to be ready..."
          timeout 180 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" dccbot-test-xdcc 2>/dev/null)" = "healthy" ]; do sleep 2; done'
          echo "XDCC bot is ready!"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-cache-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-cache-

      - name: Set up Python environment
        run: |
          wget -qO- https://astral.sh/uv/install.sh | sh
          uv sync

      - name: Run Integration Tests
        run: |
          cp config.json.sample config.json
          uv run pytest tests/integration -v -m integration --timeout=120

      - name: Stop services
        if: always()
        run: docker compose down
